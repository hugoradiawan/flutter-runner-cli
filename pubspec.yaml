name: frun
description: A terminal UI for Flutter development — devices, hot reload, DevTools, isolates and widget inspector, all without leaving the shell.
version: 0.2.0
repository: https://github.com/hugoradiawan/flutter-runner-cli
issue_tracker: https://github.com/hugoradiawan/flutter-runner-cli/issues

environment:
  sdk: ">=3.9.2 <4.0.0"

executables:
  frun: frun

dependencies:
  args: ^2.5.0
  equatable: ^2.0.5
  path: ^1.9.0
  dart_tui: ^1.2.0
  vm_service: ^15.2.0
  watcher: ^1.2.0
  yaml: ^3.1.2
  ffi: ^2.1.0

dev_dependencies:
  lints: ^6.1.0
  mocktail: ^1.0.0
  test: ^1.25.0
